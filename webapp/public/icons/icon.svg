<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Squircle background — rx=128 gives iOS-style rounded corners -->
  <rect width="512" height="512" rx="128" fill="#FAF5FF"/>

  <!-- Bold compass dial ring — 20px stroke for clear visibility at small sizes -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="#E9D5FF" stroke-width="20"/>

  <!--
    Compass needle — two smooth lens (vesica) halves that meet exactly at center (256,256).
    Each half is drawn with cubic beziers so edges curve softly outward instead of straight lines.
    North half spans y 108→256, south half spans y 256→400.
    Widest cross-section ≈ 93 px, giving clear legibility at 32 px icon sizes.
  -->

  <!-- North needle (emerald) — lens pointing up -->
  <path d="M 256 108
           C 316 140, 320 212, 256 256
           C 192 212, 196 140, 256 108 Z"
        fill="#10B981"/>

  <!-- South needle (purple) — slightly shorter lens pointing down -->
  <path d="M 256 400
           C 314 368, 318 300, 256 256
           C 194 300, 198 368, 256 400 Z"
        fill="#7C3AED"/>

  <!-- Center cap — covers the junction of the two needle halves -->
  <circle cx="256" cy="256" r="24" fill="#FAF5FF" stroke="#7C3AED" stroke-width="7"/>
</svg>
